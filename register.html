<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | SkillBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animations.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 fade-in-up">
          <div class="form-card">
            <h2 class="mb-3">Create your account</h2>
            <p class="text-muted">Join SkillBridge to showcase your work and unlock opportunities.</p>
            <form id="registerForm">
              <div class="row g-3">
                <div class="col-md-6"><input class="form-control" placeholder="First name" required /></div>
                <div class="col-md-6"><input class="form-control" placeholder="Last name" required /></div>
                <div class="col-12"><input class="form-control" type="email" placeholder="Email" required /></div>
                <div class="col-12"><input class="form-control" type="password" placeholder="Password" required /></div>
                <div class="col-12"><button type="submit" class="btn btn-primary w-100">Register</button></div>
              </div>
            </form>
            <p class="mt-3 mb-0 text-center"><a href="login.html">Already have an account?</a></p>
          </div>
        </div>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
